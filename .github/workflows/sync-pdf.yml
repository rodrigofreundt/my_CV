name: Sync CV PDF to website

on:
  push:
    branches:
      - master
    paths:
      - 'main.pdf'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout CV repo
        uses: actions/checkout@v4

      - name: Push PDF to website repo
        uses: dmnemec/copy_file_to_another_repo_action@main
        env:
          API_TOKEN_GITHUB: ${{ secrets.WEBSITE_REPO_TOKEN }}
        with:
          source_file: 'main.pdf'
          destination_repo: 'rodrigofreundt/rodrigofreundt.github.io'
          destination_folder: 'assets/pdf'
          destination_filename: 'CV_rodrigo_freundt.pdf'
          user_email: 'rodrigo.freundt@gmail.com'
          user_name: 'rodrigofreundt'
          commit_message: 'chore: update CV PDF from my_CV repo'
